name: smart_inbox_lite
description: >
  An OpenEnv-compliant environment for professional email triage.
  An LLM agent receives inbox observations containing emails with
  sender, subject, and snippet details, and must decide to
  archive, flag, or move each email to the correct folder.
version: "1.0.0"
author: "Hackathon Participant"

observation_space:
  type: text
  description: >
    A list of emails currently visible in the inbox, including sender,
    subject, snippet, and flag status. Also includes goal_progress (0.0-1.0),
    steps_remaining, and last_action_status.

action_space:
  type: discrete
  actions:
    - archive
    - flag
    - move_to_folder
    - redact
  description: >
    Email management action. NOTE: Redact is MANDATORY for emails containing PII.

endpoints:
  health: /health
  reset:  /reset
  step:   /step
  state:  /state

tasks:
  - id: easy
    description: >
      Archive promotional emails (Pizza, Shoes) to declutter the inbox.
    steps: 3
    ideal_action: archive

  - id: medium
    description: >
      Flag urgent security/HR alerts and archive newsletters.
    steps: 3
    ideal_action: flag

  - id: hard
    description: >
      Multi-task: Flag priority alerts, move project emails to Work, and redact PII.
    steps: 3
    ideal_action: flag

  - id: expert
    description: >
      Enterprise Triage: Multi-category management with high-stakes security requirements.
    steps: 5
    ideal_action: redact

  - id: insane
    description: >
      Chaos Mode: High volume inbox with aggressive dynamic spawning and security traps.
    steps: 10
    ideal_action: redact

scoring:
  reward_range: [0.01, 0.99]
  success_threshold: 0.8
  score_formula: max(0.01, min(0.99, programmatic_score))

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2
