name: smart_inbox_pro
version: "2.0.0"
description: "A professional, rigorous RL benchmark for email triage, security reasoning, and enterprise tool usage. Features generative scenarios, adversarial traps, and a dense multi-criteria reward system."
tags: [openenv, email, triage, security, ai-safety, real-world]
seed_support: true

tasks:
  - name: easy-triage
    description: "Archive promotional content and maintain inbox hygiene (5 emails)."
    difficulty: easy
  - name: medium-triage
    description: "Manage enterprise coordination, redact sensitive PII, and handle urgent alerts (10 emails)."
    difficulty: medium
  - name: hard-triage
    description: "Security Architect Challenge: Detect sophisticated phishing, verify spoofed internal requests, and ensure data compliance (15 emails)."
    difficulty: hard

api:
  reset: POST /reset
  step: POST /step
  state: GET /state
  health: GET /health

scoring:
  reward_range: [-1.0, 1.0]
  success_threshold: 0.85
  partial_credit: true
  security_rigor: high

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2
