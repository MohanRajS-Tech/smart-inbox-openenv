name: smart_inbox_lite
version: "1.0.0"
description: "A professional 3-task email triage environment with normalized scoring (0.0 - 1.0)."
author: "Hackathon Participant"
license: "MIT"
entrypoint: "inference.py"
tasks:
  - id: "easy"
    description: "Archive the 2 promotional emails (Pizza and Shoes) to declutter the inbox."
    difficulty: "easy"
    grader: "programmatic"
  - id: "medium"
    description: "Flag the 2 urgent alerts (Security and HR) while archiving the 2 newsletters."
    difficulty: "medium"
    grader: "programmatic"
  - id: "hard"
    description: "Flag 2 high-priority alerts AND move 2 project-related emails to the 'Work' folder."
    difficulty: "hard"
    grader: "programmatic"
tags:
  - email-triage
  - openenv
  - partial-scoring
  - agentic-reasoning
