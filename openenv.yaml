name: smart_inbox_lite
description: "A professional 3-task email triage environment with normalized scoring (0.0 - 1.0)."
version: "1.0.0"
author: "Hackathon Participant"
license: "MIT"
entrypoint: "inference.py"
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - id: "easy"
    description: "Archive the promotional emails (Pizza and Shoes) to declutter the inbox."
    difficulty: "easy"
    steps: 15
  - id: "medium"
    description: "Flag the urgent alerts (Security and HR) while archiving the newsletters."
    difficulty: "medium"
    steps: 15
  - id: "hard"
    description: "Flag priority alerts AND move project emails to the 'Work' folder."
    difficulty: "hard"
    steps: 15

tags:
  - email-triage
  - openenv
  - partial-scoring
  - agentic-reasoning

scoring:
  reward_range: [0.0, 1.0]
  success_threshold: 0.8
  score_formula: "mean(step_rewards)"

